[package]
name = "kernel"
version = "0.1.0"
edition = "2024"

[dependencies]
bootloader_api = "0.11.12"
spin = "0.10.0"
uart_16550 = "0.4.0"
x86_64 = "0.15.2"

[dependencies.noto-sans-mono-bitmap]
version = "0.2.0"
default-features = false
features = [
    "regular",
    "size_16",
    "unicode-basic-latin",
    # required for the fallback char '�'
    "unicode-specials",
]

[dependencies.lazy_static]
version = "1.5.0"
features = ["spin_no_std"]